<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Antibullismo MS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f9; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #003366; color: white; }
        .container { padding: 20px; text-align: center; }
        #shareBtn { background: #ffcc00; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        footer { text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid #ccc; font-size: 14px; }
        footer a { color: #003366; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <h2>Team Antibullismo MS</h2>
        <button id="shareBtn">📢 Condividi</button>
    </header>

    <div class="container">
        <h1>Benvenuti nel Portale della Squadra Antibullismo</h1>
        <p>Istituto Magnaghi Solari. Insieme contro il bullismo e il cyberbullismo.</p>
        <img src="LOGO.jpg" alt="Logo Istituto" style="max-width: 100%; height: auto; margin-top: 20px; max-height: 200px;">
    </div>

    <footer>
        <p>Sei su dispositivo mobile? <a href="https://www.magnaghisolari.edu.it" target="_blank" rel="noopener">Passa alla versione desktop del sito</a></p>
    </footer>

    <script>
        // Registrazione Service Worker per la PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registrato'))
                .catch(err => console.log('Errore SW:', err));
        }

        // Funzione del pulsante Condividi
        const shareBtn = document.getElementById('shareBtn');
        if (navigator.share) {
            shareBtn.addEventListener('click', async () => {
                try {
                    await navigator.share({
                        title: 'Portale Antibullismo - Magnaghi Solari',
                        text: 'Accedi al portale della squadra antibullismo del nostro Istituto.',
                        url: window.location.href
                    });
                } catch (err) { console.log('Condivisione annullata', err); }
            });
        } else {
            shareBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copiato negli appunti! Ora puoi condividerlo.');
            });
        }
    </script>
</body>
</html>
